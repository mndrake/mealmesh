# Netlify config for the MealMesh SPA.
# The app lives in app/; the build falls back to the committed recipe bundle when
# recipe-repo/ is absent (see app/scripts/build-data.mjs), so it builds in CI/Netlify.
# Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in the Netlify site env (UI),
# NOT here. Never put the service_role key anywhere in this repo or the build env.

[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

# Vite 8 requires Node >= 20.19; pin it so Netlify doesn't build on an older default
# (which fails the build and publishes nothing). Matches the CI Node version.
[build.environment]
  NODE_VERSION = "20"
  # The Supabase URL + publishable (anon) key are PUBLIC by design — Vite embeds them
  # in the client bundle and RLS, not key secrecy, protects the data. Tell Netlify's
  # secrets scanner these values are expected in the build output so it doesn't fail
  # the deploy. (Set them as regular, non-secret env vars in the Netlify UI.)
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# Netlify Functions — the Kroger broker. Directory is relative to base = "app".
# Secrets (KROGER_CLIENT_SECRET, SUPABASE_SERVICE_ROLE_KEY) are function env only,
# never in the client bundle.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Route /api/kroger/* to the functions. MUST precede the SPA catch-all below
# (redirects are evaluated top-to-bottom, first match wins).
[[redirects]]
  from = "/api/kroger/status"
  to = "/.netlify/functions/kroger-status"
  status = 200
[[redirects]]
  from = "/api/kroger/auth-url"
  to = "/.netlify/functions/kroger-auth-url"
  status = 200
[[redirects]]
  from = "/api/kroger/callback"
  to = "/.netlify/functions/kroger-callback"
  status = 200
[[redirects]]
  from = "/api/kroger/locations"
  to = "/.netlify/functions/kroger-locations"
  status = 200
[[redirects]]
  from = "/api/kroger/location"
  to = "/.netlify/functions/kroger-location"
  status = 200
[[redirects]]
  from = "/api/kroger/match"
  to = "/.netlify/functions/kroger-match"
  status = 200
[[redirects]]
  from = "/api/kroger/advise"
  to = "/.netlify/functions/kroger-advise"
  status = 200
[[redirects]]
  from = "/api/kroger/cart"
  to = "/.netlify/functions/kroger-cart"
  status = 200
[[redirects]]
  from = "/api/kroger/sent"
  to = "/.netlify/functions/kroger-sent"
  status = 200
[[redirects]]
  from = "/api/kroger/alias"
  to = "/.netlify/functions/kroger-alias"
  status = 200
[[redirects]]
  from = "/api/recipes/import"
  to = "/.netlify/functions/recipe-import"
  status = 200
[[redirects]]
  from = "/api/recipes/generate"
  to = "/.netlify/functions/recipe-generate"
  status = 200
[[redirects]]
  from = "/api/coach/ask"
  to = "/.netlify/functions/coach-ask"
  status = 200

# SPA fallback so client-side routing / deep links resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (see docs/security.md). HTTPS/HSTS is enforced by Netlify.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # connect-src allows Supabase REST (https) + Realtime (wss). Scoped to *.supabase.co;
    # pin to your exact project origin for stricter CSP during M4 hardening.
    # style-src 'unsafe-inline' is required because the app uses React inline style props.
    # img-src also allows Kroger product image hosts (Send-to-Mariano's picker) and our
    # Supabase Storage origin (re-hosted imported-recipe images). Scoped to our own hosts —
    # no broad "https:" allowance.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https://*.kroger.com https://*.kgrps.com https://*.supabase.co; font-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co"
